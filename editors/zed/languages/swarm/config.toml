name = "Swarm"
grammar = "swarm"
path_suffixes = ["sw"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
autoclose_before = ";:.,=}])> \n\t"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = false },
]
word_characters = ["_"]
